<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <defs>
    <linearGradient id="mk-grad" x1="20" y1="20" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A2A6E"/>
      <stop offset="0.5" stop-color="#1948C9"/>
      <stop offset="1" stop-color="#2D7CFF"/>
    </linearGradient>
    <linearGradient id="mk-arrow" x1="105" y1="180" x2="210" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D7CFF"/>
      <stop offset="1" stop-color="#8EBCFF"/>
    </linearGradient>
  </defs>

  <!-- F estilizado (block letter com cantos suavemente arredondados) -->
  <path
    d="M 30 32
       Q 30 28 34 28
       L 130 28
       Q 134 28 134 32
       L 134 52
       Q 134 56 130 56
       L 60 56
       L 60 96
       L 108 96
       Q 112 96 112 100
       L 112 118
       Q 112 122 108 122
       L 60 122
       L 60 188
       Q 60 192 56 192
       L 34 192
       Q 30 192 30 188
       Z"
    fill="url(#mk-grad)"
  />

  <!-- 3 barras crescentes (gráfico) -->
  <rect x="120" y="148" width="18" height="44" rx="5" fill="url(#mk-grad)" />
  <rect x="146" y="118" width="18" height="74" rx="5" fill="url(#mk-grad)" />
  <rect x="172" y="86"  width="18" height="106" rx="5" fill="url(#mk-grad)" />

  <!-- Seta de crescimento (passa por cima das barras) -->
  <line x1="118" y1="170" x2="180" y2="62" stroke="url(#mk-arrow)" stroke-width="13" stroke-linecap="round" />
  <path d="M 196 48 L 158 48 L 196 86 Z" fill="url(#mk-arrow)" />
</svg>
